name: lexiprep

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lexiprep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lexiprep}
      POSTGRES_DB: ${POSTGRES_DB:-lexiprep}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lexiprep} -d ${POSTGRES_DB:-lexiprep}"]
      interval: 5s
      timeout: 5s
      retries: 12

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-lexiprep}:${POSTGRES_PASSWORD:-lexiprep}@db:5432/${POSTGRES_DB:-lexiprep}
      CI: "true"
    working_dir: /workspace/lexiprep/apps/server
    # node_modules live in named volumes (not the host's, which is built against a
    # different pnpm store). The server is the sole installer; it populates the
    # shared apps/web volume too, so web just runs vite. The sibling lexiprep-core
    # is mounted at its mirrored path so `link:../../../lexiprep-core` resolves.
    command: sh -c "pnpm install --frozen-lockfile && pnpm db:push && pnpm db:seed && pnpm dev"
    volumes:
      - ./:/workspace/lexiprep
      - ../lexiprep-core:/workspace/lexiprep-core
      - nm_root:/workspace/lexiprep/node_modules
      - nm_server:/workspace/lexiprep/apps/server/node_modules
      - nm_web:/workspace/lexiprep/apps/web/node_modules
    ports:
      - "${SERVER_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      PROXY_TARGET: http://server:3000
    working_dir: /workspace/lexiprep/apps/web
    # No install here — the server already populated the shared node_modules volumes.
    command: sh -c "pnpm dev"
    volumes:
      - ./:/workspace/lexiprep
      - ../lexiprep-core:/workspace/lexiprep-core
      - nm_root:/workspace/lexiprep/node_modules
      - nm_server:/workspace/lexiprep/apps/server/node_modules
      - nm_web:/workspace/lexiprep/apps/web/node_modules
    ports:
      - "${WEB_PORT:-5173}:5173"

volumes:
  pgdata:
  nm_root:
  nm_server:
  nm_web:
