# Production stack for self-hosting (internal / small group). See `make help` and the
# "Deploy" section of the README. Differs from the dev compose (docker-compose.yml):
#   - prod image targets, NODE_ENV=production
#   - deps live in persisted volumes populated once by `make install` — a deploy never
#     reinstalls node_modules (only `make install` does, when the lockfile changes)
#   - source is bind-mounted, so `git pull` + a quick restart is the whole update
#   - only the web port is published; the API is reached through web's /api proxy
#
# Required secrets in .env (see .env.example): POSTGRES_PASSWORD, BETTER_AUTH_SECRET,
# BETTER_AUTH_URL, WEB_ORIGIN.
name: lexiprep-prod

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lexiprep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-lexiprep}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lexiprep}"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-lexiprep}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-lexiprep}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:5173}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:5173}
    working_dir: /workspace/lexiprep/apps/server
    # Deps come from the persisted volumes (populated by `make install`) — no reinstall on
    # deploy. @lexiprep/core is an npm dependency, so just start the server.
    command: pnpm --filter @lexiprep/server start
    volumes:
      - ./:/workspace/lexiprep
      - nm_root:/workspace/lexiprep/node_modules
      - nm_server:/workspace/lexiprep/apps/server/node_modules
      - nm_web:/workspace/lexiprep/apps/web/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: prod
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      PROXY_TARGET: http://server:3000
    working_dir: /workspace/lexiprep/apps/web
    volumes:
      - ./:/workspace/lexiprep
      - nm_root:/workspace/lexiprep/node_modules
      - nm_server:/workspace/lexiprep/apps/server/node_modules
      - nm_web:/workspace/lexiprep/apps/web/node_modules
    # No host port — caddy is the only public entry and reaches web:5173 over the
    # compose network.

  # Reverse proxy / the single public entry. Serves plain HTTP on :80 by default
  # (http://SERVER_IP). Set SITE_ADDRESS=your.domain in .env → automatic HTTPS on :443.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    # Host 80/443 are owned by clara-nginx-proxy on this server, so publish caddy on
    # 8080/8443 instead (caddy still listens on container :80/:443). Reach the app at
    # http://SERVER_IP:8080. The only change needed to coexist on this shared prod host.
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  # DB backups → Cloudflare R2 (see apps/server/ops/backup, spec 08). A busybox-crond
  # sidecar: pg_dump → gzip → rclone copy → verify → healthchecks.io ping. Opt-in —
  # stays idle until BACKUP_R2_* are set in .env, so it never blocks the stack.
  backup:
    build:
      context: apps/server/ops/backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-lexiprep}
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      PGDATABASE: ${POSTGRES_DB:-lexiprep}
      BACKUP_R2_REMOTE: ${BACKUP_R2_REMOTE:-r2}
      BACKUP_R2_BUCKET: ${BACKUP_R2_BUCKET:-lexiprep}
      BACKUP_R2_PREFIX: ${BACKUP_R2_PREFIX:-db-backups}
      BACKUP_R2_ACCESS_KEY_ID: ${BACKUP_R2_ACCESS_KEY_ID:-}
      BACKUP_R2_SECRET_ACCESS_KEY: ${BACKUP_R2_SECRET_ACCESS_KEY:-}
      BACKUP_R2_ENDPOINT: ${BACKUP_R2_ENDPOINT:-}
      BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
      BACKUP_MIN_SIZE: ${BACKUP_MIN_SIZE:-1000}
      BACKUP_HOSTNAME: ${BACKUP_HOSTNAME:-prod}
      BACKUP_HC_URL: ${BACKUP_HC_URL:-}

volumes:
  pgdata:
  nm_root:
  nm_server:
  nm_web:
  caddy_data:
  caddy_config:
